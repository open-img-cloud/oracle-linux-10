name: Build & publish image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version in 10.<U>-b<B> form (otherwise derived from tag, falling back to VERSION file)'
        required: false
      publish:
        description: 'If false, skip upload + CF purge (PR / dry-run validation)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # cosign keyless via GitHub OIDC

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      update_id: ${{ steps.v.outputs.update_id }}
      build_id: ${{ steps.v.outputs.build_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -f VERSION ]]; then
            v=$(tr -d '[:space:]' < VERSION)
          else
            echo "::error::no version provided and no VERSION file found"
            exit 1
          fi
          # VERSION format: 10.<U>-b<B> — split into update_id (U) and build_id (B)
          # so the upstream_url can be parameterised.
          if [[ "$v" =~ ^10\.([0-9]+)-b([0-9]+)$ ]]; then
            update_id="${BASH_REMATCH[1]}"
            build_id="${BASH_REMATCH[2]}"
          else
            echo "::error::version '$v' doesn't match the expected '10.<U>-b<B>' form (e.g. 10.1-b270)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "update_id=$update_id" >> "$GITHUB_OUTPUT"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$v update_id=$update_id build_id=$build_id"

  build:
    needs: resolve-version
    name: Build
    uses: open-img-cloud/.github/.github/workflows/build-libguestfs-image.yml@main
    with:
      os_name: oracle-linux-10
      version: ${{ needs.resolve-version.outputs.version }}
      output_filename: 'oracle-linux-10-{version}-x86_64.qcow2'
      # Oracle's CDN serves under /templates/OracleLinux/OL{MAJOR}/u{U}/x86_64/.
      # We rebuild the URL from the parsed (update_id, build_id) pair to keep
      # detect-upstream and release.yml in sync — the VERSION file is the
      # only source of truth for U + B.
      upstream_url: 'https://yum.oracle.com/templates/OracleLinux/OL10/u${{ needs.resolve-version.outputs.update_id }}/x86_64/OL10U${{ needs.resolve-version.outputs.update_id }}_x86_64-kvm-b${{ needs.resolve-version.outputs.build_id }}.qcow2'
      decompress: none
      customize_script: build/customize.sh
      run_sysprep: true
      sparsify_compress: true
      publish: ${{ inputs.publish == true || github.event_name == 'push' }}
      sync_latest: true
    secrets: inherit
