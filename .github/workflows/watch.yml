name: Watch upstream

on:
  schedule:
    - cron: '47 6 * * *'   # daily 06:47 UTC, ~7-8am Europe/Zurich (offset from previous watchers)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    uses: open-img-cloud/.github/.github/workflows/upstream-watch.yml@main
    with:
      os_name: oracle-linux-10
